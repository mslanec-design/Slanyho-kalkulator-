  "atm": `Atmosféra = 101 325 Pa. Definice: tlak vzduchu u hladiny moře.`,
  "at": `Technická atmosféra = 98 066,5 Pa. Používána v průmyslu, nyní nahrazována bar.`,
  "torr": `1 Torr ≈ 1 mmHg. Pojmenována po Torricellim, vynálezci barometru.`,
  "mmhg": `Milimetr rtuťového sloupce. Krevní tlak: 120/80 mmHg je normální hodnota.`,
  "inhg": `Palec rtuťového sloupce. Standard pro letecké barometry a US meteorologii.`,
  "cmh2o": `Centimetr vodního sloupce. Používá se v medicíně pro tlak dýchacích cest.`,
  "inh2o": `Palec vodního sloupce — měření tlaku v potrubí HVAC systémů v USA.`,
  "psi": `Pounds per square inch = 6895 Pa. Pneumatiky: 32–35 PSI. Lidská kůže: ~100 PSI.`,
  "psf": `Libra na čtvereční stopu = 47,88 Pa. Standard pro zatížení střech v USA.`,
  "uw": `Mikrowatt — výkon Bluetooth signálu je ~1 mW, solárního článku venku ~100 mW.`,
  "mw": `Miliwatt — výkon laserové diody CD přehrávače ~5 mW. LED dioda ~20–30 mW.`,
  "w": `Watt = J/s. Žárovka 60 W, člověk při chůzi ~80 W. Pojmenován po Jamesu Wattovi.`,
  "kw": `Kilowatt — motor průměrného auta 100–150 kW. Rychlonabíječka EV ~50–350 kW.`,
  "megw": `Megawatt — výkon větrné turbíny 2–5 MW. Malá elektrárna ~100 MW.`,
  "gw": `Gigawatt — jaderná elektrárna Temelín ~2 GW. Spotřeba ČR ~10 GW ve špičce.`,
  "tw": `Terawatt — celková světová spotřeba elektřiny ~2,5 TW. Slunce vyzařuje 386 × 10¹² TW.`,
  "hp": `Koňská síla = 745,7 W. Watt ji zavedl pro srovnání parního stroje s koněm.`,
  "kss": `Koňská síla (metrická) = 735,5 W. Mírně odlišná od britské. Auta v EU udávají PS.`,
  "btu_h": `BTU za hodinu — klimatizace 12 000 BTU/h ≈ 3,5 kW. Standard USA.`,
  "cal_s": `Kalorie za sekundu = 4,184 W. Řídká vědecká jednotka tepelného výkonu.`,
  "ftlbs": `Stopa-libra za sekundu = 1,356 W. Historická mechanická jednotka výkonu.`,
  "ergs": `Erg za sekundu = 100 nW. CGS jednotka výkonu, dnes pouze historická.`,
  "bit": `Nejmenší jednotka informace — 0 nebo 1. Název z 'binary digit' (1948, Tutte & Shannon).`,
  "byte": `8 bitů = 1 byte. Standart zavedla IBM. Jeden znak ASCII = 1 byte.`,
  "kb": `Kilobyte = 1000 B (SI). E-mail bez přílohy ~2–10 KB. Textový soubor ~1–100 KB.`,
  "mb": `Megabyte — MP3 písnička ~3–5 MB. Fotka z mobilu ~3–8 MB.`,
  "gb": `Gigabyte — film HD ~4–15 GB. Operační paměť počítače 8–32 GB.`,
  "tb": `Terabyte — pevný disk počítače 1–8 TB. Světový internet přenáší ~5 EB za den.`,
  "pb": `Petabyte — Facebook ukládá ~100 PB dat. Celý internet má ~5 milionů PB.`,
  "eb": `Exabyte — za rok se světem přenese ~120 exabytů dat. Nezastavitelný růst.`,
  "zb": `Zettabyte — celý digitální svět obsahuje ~120 ZB dat (2023). Dále roste.`,
  "yb": `Yottabyte = 10²⁴ B. Žádná existující infrastruktura nedosahuje yottabytového řádu.`,
  "kib": `Kibibyte = 1024 B. IEC norma z 1998 zavedla předpony kibi/mebi/gibi pro 2ⁿ.`,
  "mib": `Mebibyte = 1024 KiB = 1 048 576 B. Windows reportuje kapacity v MiB, ne MB!`,
  "gib": `Gibibyte = 1024 MiB. Disk '1 TB' má ve skutečnosti ~931 GiB — proto 'menší'.`,
  "tib": `Tebibyte = 1024 GiB. Relevantní pro přesné výpočty kapacity serverů.`,
  "eib": `Exbibyte = 2⁶⁰ B. Hyper-velké datové centrum má řádově jednotky EiB.`,
  "zib": `Zebibyte = 2⁷⁰ B. Čistě teoretická jednotka pro budoucí datové objemy.`,
  "kbit": `Kilobit — rychlost internetu se udává v Mbit/s. 1 Mbit/s = 125 KB/s.`,
  "mbit": `Megabit — 100 Mbit/s = rychlá domácí linka. Přenos 1 GB trvá ~80 sekund.`,
  "gbit": `Gigabit — optické připojení 1 Gbit/s je dnes standard pro datacentry.`,
  "tbit": `Terabit — podmořské kabely přenáší stovky Tbit/s celkovou kapacitou.`,
  "deg": `Stupeň — 360° = plný obrat. Babylóňané zvolili 360 pro dělitelnost 2,3,4,5,6.`,
  "rad": `Radián — přirozená matematická jednotka. 2π rad = 360°. Úhel, kde oblouk = poloměr.`,
  "mrad": `Miliradian — snipery používají mrad pro korekci střelby na dálku.`,
  "urad": `Mikroradian — přesnost laserových přístrojů a teleskopů v µrad.`,
  "grad": `Gradian = 1/400 plného kruhu. Francouzská revoluce zavedla desetinný systém úhlů.`,
  "turn": `Otočení = 360°. V programování přehledná jednotka pro rotace.`,
  "arcmin": `Úhlová minuta = 1/60 stupně. Rozlišovací schopnost lidského oka ~1 arcmin.`,
  "arcsec": `Úhlová vteřina — Hubbleův teleskop vidí předměty s přesností 0,05 arcsec.`,
  "sign": `Znamení = 30° = 1/12 kruhu. Zodiak má 12 znamení, každé 30° ekliptiky.`,
  "mil": `Vojenský mil ≈ 1/6400 kruhu. 1 mil = 1 metr na 1 km vzdálenosti.`,
  "cpoint": `Kompasní bod = 1/32 kruhu = 11,25°. Tradiční námořní navigační dělení.`,
  "n": `Newton = kg·m/s². Tíha 100g jablka ~1 N. Pojmenován po Isaacovi Newtonovi.`,
  "kn": `Kilonewton — nosnost průmyslových jeřábů: 10–500 kN. Sloup táhne cca 1 kN.`,
  "mn": `Meganewton — tah raketového motoru Falcon 9 při startu ~7,6 MN.`,
  "dyn": `Dyne = 10 µN. CGS jednotka síly. Povrchové napětí vody ~72 dyn/cm.`,
  "lbf": `Pound-force = 4,448 N. Síla tíhy 1 libry. Standard v US průmyslu.`,
  "kgf": `Kilogram-síla = 9,807 N. Stále běžná v technické praxi ČR i Rusku.`,
  "gf": `Gram-síla = 9,807 mN. Tlaková citlivost touchscreenů se měří v gf.`,
  "kip": `Kip = 1000 lbf = 4448 N. Standard amerického stavebního inženýrství.`,
  "pdl": `Poundal = 0,138 N. Imperiální jednotka síly — dnes téměř obsoletní.`,
  "ozf": `Unce-síla = 0,278 N. Používána v elektronice pro měření slabých sil.`,
  "tor_nm": `Newtonmetr — točivý moment motoru aut: 100–800 Nm. Utahovací moment šroubů.`,
  "knm": `Kilonewtonmetr = 1000 Nm. Používá se pro momenty v stavebních konstrukcích.`,
  "mnm": `Meganewtonmetr — momenty v těžkých strojích a základech mostů.`,
  "lbfft": `Libra-stopa = 1,356 Nm. Standard točivého momentu motorů v USA.`,
  "lbfin": `Libra-palec = 0,113 Nm. Momentový klíč pro přesné elektronické sestavy.`,
  "kgfm": `Kilogram-síla-metr = 9,807 Nm. Stále používán v technické dokumentaci.`,
  "kgfcm": `Kilogram-síla-centimetr = 0,098 Nm. Standard v modelářství a servomotorech.`,
  "ozfin": `Unce-palec = 7,06 mNm. Moment u miniaturních motorků a serv.`,
  "dyncm": `Dyne-centimetr = 100 nNm. CGS jednotka momentu. Dnes extrémně vzácná.`,
  "hz": `Hertz = 1 cyklus/s. Pojmenován po Heinrichu Hertzovi. Srdeční tep ~1 Hz.`,
  "khz": `Kilohertz — slyšitelný zvuk 20–20 000 Hz. AM rádio vysílá v kHz.`,
  "mhz": `Megahertz — FM rádio 88–108 MHz. CPU v 80. letech ~8 MHz, dnes GHz.`,
  "ghz": `Gigahertz — moderní CPU 3–5 GHz. WiFi 2,4 GHz a 5 GHz.`,
  "thz": `Terahertz — záření THz prochází oblečením, využívá se v bezpečnostních skenerech.`,
  "rpm": `Otáčky za minutu — motor auta běží 800–7000 RPM. Pevný disk 5400/7200 RPM.`,
  "rps": `Otáčky za sekundu. Turbína proudového motoru ~200 RPS = 12 000 RPM.`,
  "rads": `Radiány za sekundu — fyzikální úhlová rychlost. ω = 2π × frekvence.`,
  "ms2a": `Metr za sekundu na druhou. Volný pád = 9,81 m/s². Auto zrychlí 0–100 za ~7 s.`,
  "ga": `g = 9,80665 m/s². Piloti stíhaček snáší 9g. Při 4–5g člověk omdlívá.`,
  "cms2a": `Cm/s² — Gal = 1 cm/s². Seismologie měří zemětřesení v Gal.`,
  "fts2a": `Stopa za sekundu na druhou. Volný pád = 32,17 ft/s².`,
  "gala": `Gal = 1 cm/s². Pojmenován po Galileu Galilei. Standard v geodézii.`,
  "kms2a": `Km/s² — extrémní zrychlení raketových motorů v ranné fázi startu.`,
  "l100": `Litry na 100 km — evropský standard. Průměrné auto 6–8 l/100km. Tesla ~0 (elektro).`,
  "kml": `Kilometry na litr — asijský standard. 15 km/l = 6,67 l/100km.`,
  "mpgus": `Míle na galon (US) — americký standard. 30 mpg ≈ 7,8 l/100km.`,
  "mpguk": `Míle na galon (UK) — britský standard. Větší galon = vyšší čísla než US.`,
  "mil2": `Míle na litr. Kompromis mezi americkým a evropským systémem.`,
  "kgm3": `Kg/m³ — vzduch ~1,225 kg/m³, voda 1000 kg/m³, ocel ~7850 kg/m³.`,
  "gcm3": `G/cm³ = kg/l. Zlatník má hustotu 19,3 g/cm³. Voda je přesně 1 g/cm³ při 4 °C.`,
  "gl": `G/l — hustota vzduchu ≈ 1,225 g/l. Praktická pro plyny a zředěné roztoky.`,
  "kgl": `Kg/l = g/cm³. Dieselové palivo má hustotu ~0,83 kg/l.`,
  "mgml": `Mg/ml = g/l. Používá se v biochemii a farmacii pro koncentrace roztoků.`,
  "lbft3": `Libra na kubickou stopu. Hustota dřeva 25–50 lb/ft³. Standard v USA.`,
  "lbgal": `Libra na galon. Voda = 8,34 lb/gal. Standard pro průmyslové kapaliny v USA.`,
  "ozin3": `Unce na kubický palec = 1,73 g/cm³. Vzácná konstrukční jednotka v USA.`,
  "m3s": `Metr krychlový za sekundu. Průtok Vltavy v Praze ~150 m³/s v normálu.`,
  "m3h": `Metr krychlový za hodinu. Ventilace budov: 300–3000 m³/h.`,
  "ls": `Litr za sekundu. Vodovodní přípojka domu: 0,5–2 l/s.`,
  "lm": `Litr za minutu. Domácí čerpadlo: 20–80 l/min. Lednice s vodou: 1–2 l/min.`,
  "lh": `Litr za hodinu. Kapková závlaha: 1–4 l/h na kapač.`,
  "gpm": `Galon za minutu (US). Průtok vodovodního kohoutku ~2 GPM. Standard v USA.`,
  "cfm": `Kubická stopa za minutu. Výkon vzduchových kompresorů v USA.`,
  "cfs": `Kubická stopa za sekundu. Standard hydrologů v USA pro průtoky řek.`,
  "uv": `Mikrovolt — biosignály EEG mozku mají amplitudu 1–100 µV.`,
  "mv": `Milivolt — EKG srdce produkuje signál ~1 mV. Baterie článku NiMH ~1,2 V.`,
  "v": `Volt — standard domácí sítě: 230 V (EU), 120 V (USA). Pojmenován po Voltovi.`,
  "kv": `Kilovolt — vysokonapěťové vedení 110–400 kV. Rentgenové přístroje 25–150 kV.`,
  "MV": `Megavolt — blesk dosahuje napětí 100–1000 MV. Fusion reaktory ~MV.`,
  "ua": `Mikroampér — klidový proud mikroprocesoru v sleep modu ~10 µA.`,
  "ma": `Miliampér — LED dioda ~20 mA. USB 2.0 dodává max 500 mA.`,
  "a": `Ampér — základní SI jednotka. Žárovka 60 W při 230 V = 0,26 A.`,
  "ka": `Kiloampér — blesk má proud ~20 kA. Svářecí stroje pracují s kA.`,
  "uohm": `Mikroohm — odpor supravodičů je 0 µΩ. Měď má odpor ~17 nΩ·m.`,
  "mohm": `Miliohm — odpor přechodů v PCB, konektorů a relé se měří v mΩ.`,
  "ohm": `Ohm — Ohmův zákon: U = R × I. Pojmenován po Georgu Simonovi Ohmovi.`,
  "kohm": `Kiloohm — pull-up/pull-down rezistory v digitální elektronice: 1–100 kΩ.`,
  "Mohm": `Megaohm — vstupní impedance voltmetru: >10 MΩ. Izolace vodičů: >100 MΩ.`,
  "Gohm": `Gigaohm — odpor skla nebo suché kůže. Citlivé zesilovače mají vstupy GΩ.`,
  "pf": `Pikofarad — kapacita PCB cest a konektorů ~1–10 pF. Krystalové oscilátory.`,
  "nf": `Nanofarad — blokovací kondenzátory v elektronice: 10–100 nF.`,
  "uf": `Mikrofarad — elektrolytické kondenzátory v napájení: 10–10 000 µF.`,
  "mf": `Milifarad — superkondenzátory dosahují mF. Řídká jednotka v elektronice.`,
  "f": `Farad — obrovská kapacita. Superkondenzátor (ultrakapacitor): 1–10 000 F.`,
  "kf": `Kilofarad — extrémní superkondenzátory pro záložní napájení průmyslu.`,
  "nh": `Nanohenry — parazitní indukčnost SMD součástek a vodičů PCB: 1–100 nH.`,
  "uh": `Mikrohenry — tlumivky v DC-DC měničích: 1–100 µH.`,
  "mh": `Milihenry — transformátory audio frekvencí a filtry: 1–100 mH.`,
  "henry": `Henry — transformátory síťové frekvence: 1–100 H. Pojmenován po Josephu Henrym.`,
  "kh": `Kilohenry — masivní napájecí transformátory. Extrémně velká indukčnost.`,
  "nc": `Nanocoulomb — elektrostatický náboj na izolovaném kovovém tělísku.`,
  "uc": `Mikrocoulomb — náboj kondenzátoru 1 µF při 1 V = 1 µC.`,
  "mc": `Milicoulomb — náboj akumulátoru 1 mAh = 3,6 mC.`,
  "c2": `Coulomb = A·s. Náboj ~6,24 × 10¹⁸ elektronů. Pojmenován po Charlesi de Coulombovi.`,
  "kc": `Kilocoulomb — náboj akumulátoru 100 Ah = 360 kC.`,
  "ah": `Ampérhodina — kapacita baterií. Baterie telefonu ~3000–5000 mAh.`,
  "mah": `Miliampérhodina — standard pro kapacitu akumulátorů spotřební elektroniky.`,
  "fdy": `Faraday = 96 485 C. Náboj jednoho molu elektronů. Základ elektrochemie.`,
  "ut": `Mikrotesla — magnetické pole Země ~25–65 µT. MRI pro mozek ~3–7 µT.`,
  "mt": `Militesla — magnetické pole permanentního magnetu neodym ~100 mT.`,
  "t2": `Tesla — MRI přístroje 1,5–7 T. Pojmenována po Nikoli Teslovi.`,
  "kt": `Kilotesla — experimentální výzkumné magnety na Floridě dosáhly ~45 T.`,
  "gs": `Gauss = 0,1 mT. CGS jednotka. Zemské pole ~0,5 G. Stále běžná v průmyslu.`,
  "mgs": `Miligauss = 0,1 µT. Standard pro EMF měření v obytných budovách.`,
  "lx": `Lux = lm/m². Slunečný den venku: 10 000–100 000 lx. Kancelář: 300–500 lx.`,
  "fc": `Foot-candle = 10,76 lx. Standard osvětlení v USA. Filmové sety měří ve fc.`,
  "ph": `Phot = 10 000 lx. Stará CGS jednotka, dnes nahrazena luxem.`,
  "mlx": `Milieux — osvětlení hvězdami za jasné noci ~1 mlx. Lidské oko to zvládne.`,
  "klx": `Kilolux — přímé slunce v letní poledne na povrchu: 80–120 klx.`,
  "bq": `Becquerel = 1 rozpad/s. Tělo dospělého ~4000 Bq díky draslíku-40. Nestrašte se.`,
  "kbq": `Kilobecquerel — aktivita lékařských diagnostik: 100–700 MBq pro PET.`,
  "mbq": `Megabecquerel — aktivita ozařovacích zářičů v medicíně.`,
  "gbq": `Gigabecquerel — aktivita čerstvého paliva v jaderném reaktoru.`,
  "ci": `Curie = 3,7 × 10¹⁰ Bq. Pojmenována po Marii Curie. Aktivita 1 g radia-226.`,
  "mci": `Millicurie — dávka pro diagnostiku (scintigrafii): 1–30 mCi.`,
  "uci": `Mikrocurie — aktivita radioizotopů používaných v laboratorních stopovačích.`,
  "gy": `Gray = J/kg. Smrtelná dávka záření pro člověka: 4–5 Gy za krátký čas.`,
  "mgy": `Miligray — RTG hrudníku: ~0,1 mGy. CT vyšetření: 2–20 mGy.`,
  "ugy": `Mikrogray — dentální RTG snímek: ~5 µGy.`,
  "rads2": `Rad = 0,01 Gy. Stará CGS jednotka. Stále v použití v USA.`,
  "mrad2": `Milirad = 0,01 mGy. Standard starší americké radiační dokumentace.`,
  "sv": `Sievert = J/kg (s váhovým faktorem). Roční přirozené záření: ~2–3 mSv.`,
  "msv": `Milisievert — let Praha–NY přináší ~0,06 mSv. Dovolená limit: 1 mSv/rok.`,
  "usv": `Mikrosievert — 1 hodina letu ~0,003 µSv/h. RTG hrudníku ~20 µSv.`,
  "rem2": `Rem = 0,01 Sv. Stará jednotka. Radiologové v USA stále používají rem.`,
  "mrem": `Millirem = 10 µSv. Jezte banán: ~0,1 mrem (obsahuje draslík-40).`,
  "pas": `Pascalsekunda — voda ~1 mPa·s, med ~10 Pa·s, sklo ~10¹² Pa·s (teče pomalu!).`,
  "mpas": `Milipascalsekunda — voda při 20 °C má viskozitu 1,002 mPa·s.`,
  "cp": `Centipoise = 1 mPa·s. Stará CGS jednotka, stále oblíbená v průmyslu.`,
  "p2": `Poise = 0,1 Pa·s. CGS jednotka. Pojmenována po Jean Léonard Marie Poiseuilleovi.`,
  "m2s": `Metr čtvereční za sekundu — kinematická viskozita vody: ~10⁻⁶ m²/s.`,
  "mm2s": `Mm²/s = cSt. Motorové oleje: 40 mm²/s při 40 °C (SAE 15W-40).`,
  "cst": `Centistokes = 1 mm²/s. Oleje v ISO VG jsou definovány v cSt při 40 °C.`,
  "stz": `Stokes = 100 cSt. Stará CGS jednotka kinematické viskozity.`,
  "nmol": `Nanomol — koncentrace hormonů v krvi: 1–100 nmol/l.`,
  "umol": `Mikromol — léky a biochemické analyzy v µmol/l.`,
  "mmol": `Milimol — hladina cukru v krvi: 4–6 mmol/l nalačno. Klíčový pro diabetiky.`,
  "mol": `Mol = 6,022 × 10²³ částic (Avogadrovo číslo). Základ chemické stechiometrie.`,
  "kmol": `Kilomol — průmyslové chemické procesy pracují s kmol látek za hodinu.`,
  "Mmol": `Megamol — masivní chemická výroba amoniaku nebo síry v Mmol/rok.`,
  "moll": `Mol/l = molarita M. Fyziologický roztok NaCl: 0,154 mol/l.`,
  "mmoll": `Mmol/l = milimolarita. Krevní glukóza: 4–6 mmol/l (norma).`,
  "umoll": `Mikromol/l — hormony, vitamíny, stopové prvky v séru.`,
  "gl2": `Gram/litr — obsah alkoholu 12% vína = 95 g/l. Koncentrace infuzí.`,
  "mgdl": `Mg/dl — americký standard hladiny glukózy: 70–99 mg/dl nalačno.`,
  "ppm": `Parts per million = 1 mg/kg. CO₂ ve vzduchu ~420 ppm. Zákonné limity.`,
  "ppb": `Parts per billion = 1 µg/kg. Pesticidy ve vodě se měří v ppb.`,
  "ppt": `Parts per trillion = 1 ng/kg. Dioxiny a hormony životního prostředí v ppt.`,
  "pct": `Procento = 10 000 ppm. 1 % = 10 g/kg. Základní relativní jednotka.`,
  "px": `Pixel — závislý na rozlišení displeje. 72 DPI: 1px = 1pt. 4K displej má ~8 MP.`,
  "pt3": `Typografický bod = 1/72 palce = 0,353 mm. Základ pro velikosti písma.`,
  "pc3": `Pica = 12 pt = 4,23 mm. Tradiční jednotka šířky textu a odsazení.`,
  "typ_mm": `Milimetr v typografii. Evropská sazba pracuje v mm pro formáty papíru.`,
  "typ_cm": `Centimetr v typografii. Méně obvyklý, občas pro velké formáty plakátů.`,
  "typ_in": `Palec v typografii. US publikace měří marginy v palcích.`,
  "em": `Em = šířka velkého M v daném písmu. Relativní CSS jednotka pro responzivní design.`,
  "npm": `Newton/metr — povrchové napětí vody ~72 mN/m. Základ teorie povrchových jevů.`,
  "fpl_knm": `Kilonewton/metr — liniové zatížení v statice budov: 5–30 kN/m.`,
  "fpl_mnm": `Meganewton/metr — extrémní zatížení pylonů mostů.`,

    fromBase: { td_m2s:v=>v, td_cm2s:v=>v/1e-4, td_mm2s:v=>v/1e-6, td_ft2s:v=>v/0.0929030, td_ft2h:v=>v*3600/0.0929030, td_in2s:v=>v/0.00064516 },
  },
  // ── PERMEABILITY (MAGNETIC) ──
  {
    id: "magPermeability", label: "Magnetická permeabilita", icon: "🌀", group: "Elektřina",
    units: [
      { id: "mp_hm",     label: "H/m",              symbol: "H/m"            },
      { id: "mp_mhm",    label: "mH/m",             symbol: "mH/m"           },
      { id: "mp_uhm",    label: "μH/m",             symbol: "μH/m"           },
      { id: "mp_nhm",    label: "nH/m",             symbol: "nH/m"           },
      { id: "mp_pico",   label: "pH/m",             symbol: "pH/m"           },
      { id: "mp_thm",    label: "T·m/A",            symbol: "T·m/A"          },
    ],
    toBase:   { mp_hm:v=>v, mp_mhm:v=>v*0.001, mp_uhm:v=>v*1e-6, mp_nhm:v=>v*1e-9, mp_pico:v=>v*1e-12, mp_thm:v=>v },
    fromBase: { mp_hm:v=>v, mp_mhm:v=>v/0.001, mp_uhm:v=>v/1e-6, mp_nhm:v=>v/1e-9, mp_pico:v=>v/1e-12, mp_thm:v=>v },
  },
  // ── ELECTRIC PERMITTIVITY ──
  {
    id: "permittivity", label: "Elektrická permitivita", icon: "🔵", group: "Elektřina",
    units: [
      { id: "pe_fm",     label: "F/m",              symbol: "F/m"            },
      { id: "pe_mfm",    label: "mF/m",             symbol: "mF/m"           },
      { id: "pe_ufm",    label: "μF/m",             symbol: "μF/m"           },
      { id: "pe_nfm",    label: "nF/m",             symbol: "nF/m"           },
      { id: "pe_pfm",    label: "pF/m",             symbol: "pF/m"           },
    ],
    toBase:   { pe_fm:v=>v, pe_mfm:v=>v*0.001, pe_ufm:v=>v*1e-6, pe_nfm:v=>v*1e-9, pe_pfm:v=>v*1e-12 },
    fromBase: { pe_fm:v=>v, pe_mfm:v=>v/0.001, pe_ufm:v=>v/1e-6, pe_nfm:v=>v/1e-9, pe_pfm:v=>v/1e-12 },
  },
];

const GROUPS = ["Základní","Fyzika","Elektřina","Geometrie","Digitální","Doprava","Světlo","Záření","Chemie","Teplo","Stavebnictví","Textil"];

function formatNumber(n) {
  if (n===null||n===undefined||isNaN(n)||!isFinite(n)) return "—";
  if (n===0) return "0";
  const abs = Math.abs(n);
  if (abs>=1e15||(abs<1e-6&&abs>0)) return n.toExponential(6).replace(/\.?0+e/,"e");
  if (abs>=1000) return n.toLocaleString("cs-CZ",{maximumFractionDigits:6});
  return parseFloat(n.toPrecision(10)).toString();
}


const GROUP_COLORS = {
  "Základní":    "#4a9eff",
  "Fyzika":      "#e8521a",
  "Elektřina":   "#f0c040",
  "Geometrie":   "#a78bfa",
  "Digitální":   "#34d399",
  "Doprava":     "#f87171",
  "Světlo":      "#fbbf24",
  "Záření":      "#fb923c",
  "Chemie":      "#60a5fa",
  "Teplo":       "#f97316",
  "Stavebnictví":"#94a3b8",
  "Textil":      "#e879f9",
};

function UnitConverter() {
  // ── Single atomic state ──
  const [st, setSt] = useState(() => {
    try {
      if (!window.location.hash) throw new Error("no hash");
      const p = new URLSearchParams(window.location.hash.slice(1));
      const catId = p.get("c") || CATEGORIES[0].id;
      const cat0 = CATEGORIES.find(c => c.id === catId) || CATEGORIES[0];
      return {
        catId,
        fromId: p.get("f") || cat0.units[0].id,
        toId:   p.get("t") || (cat0.units[1] || cat0.units[0]).id,
        input:  p.get("v") || "1",
      };
    } catch { return { catId: CATEGORIES[0].id, fromId: CATEGORIES[0].units[0].id, toId: CATEGORIES[0].units[1].id, input: "1" }; }
  });
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem("uc_dark") !== "false"; } catch { return true; }
  });
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [search, setSearch] = useState("");
  const [activeTip, setActiveTip] = useState(null);
  const [globalSearch, setGlobalSearch] = useState("");
  const [searchFocused, setSearchFocused] = useState(false);
  const [favorites, setFavorites] = useState(() => {
    try { return JSON.parse(localStorage.getItem("uc_favs") || "[]"); } catch { return []; }
  });
  const [history, setHistory] = useState([]);
  const [copied, setCopied] = useState(false);
  const [columns, setColumns] = useState(2);
  const [editingResult, setEditingResult] = useState(false);
  const [editVal, setEditVal] = useState("");
  const [showHistory, setShowHistory] = useState(false);
  const [showFavs, setShowFavs] = useState(false);
  const resultRef = useRef(null);
  const inputRef = useRef(null);

  // Always derive from same atomic state snapshot
  const cat  = CATEGORIES.find(c => c.id === st.catId) ?? CATEGORIES[0];
  const from = cat.units.find(u => u.id === st.fromId) ?? cat.units[0];
  const to   = cat.units.find(u => u.id === st.toId) ?? cat.units.find(u => u.id !== from.id) ?? cat.units[0];

  const doConvert = (val, f, t, c) => {
    const n = parseFloat(val);
    if (!f || !t || !c || isNaN(n)) return "";
    try {
      const a = c.toBase[f.id];
      const b = c.fromBase[t.id];
      if (typeof a !== "function" || typeof b !== "function") return "—";
      return formatNumber(b(a(n)));
    } catch { return "—"; }
  };

  const result = doConvert(st.input, from, to, cat);

  const switchCat = (c) => {
    setSt({ catId: c.id, fromId: c.units[0].id, toId: (c.units[1] ?? c.units[0]).id, input: "1" });
    setSearch(""); setSidebarOpen(false); setActiveTip(null);
  };

  const swapUnits = () => setSt(s => ({
    ...s,
    fromId: s.toId, toId: s.fromId,
    input: result && result !== "—" ? result : s.input,
  }));

  const grouped = useMemo(() =>
    GROUPS.map(g => ({ group: g, cats: CATEGORIES.filter(c => c.group === g) }))
          .filter(g => g.cats.length > 0), []);

  // Close tooltip on click outside
  useEffect(() => {
    if (!activeTip) return;
    const close = () => setActiveTip(null);
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [activeTip]);

  const filteredUnits = search
    ? cat.units.filter(u => u.label.toLowerCase().includes(search.toLowerCase()) || u.symbol.toLowerCase().includes(search.toLowerCase()))
    : cat.units;

  const totalUnits = CATEGORIES.reduce((a, c) => a + c.units.length, 0);

  const globalResults = useMemo(() => {
    const q = globalSearch.trim().toLowerCase();
    if (q.length < 2) return [];
    const out = [];
    for (const c of CATEGORIES)
      for (const u of c.units)
        if (c.label.toLowerCase().includes(q) || u.label.toLowerCase().includes(q) || u.symbol.toLowerCase().includes(q))
          out.push({ c, u });
    return out.slice(0, 12);
  }, [globalSearch]);

  const pickGlobal = (c, u) => {
    setSt({ catId: c.id, fromId: u.id, toId: (c.units.find(x => x.id !== u.id) ?? c.units[0]).id, input: "1" });
    setGlobalSearch(""); setSearchFocused(false); setSidebarOpen(false);
  };


  // ── URL sync (safe in sandboxed iframes) ──
  useEffect(() => {
    try {
      const h = `#c=${st.catId}&f=${st.fromId}&t=${st.toId}&v=${encodeURIComponent(st.input)}`;
      window.history.replaceState(null, "", h);
    } catch {}
  }, [st]);

  // ── Theme switch: sets data-theme on <html>, CSS vars handle the rest ──
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    try { localStorage.setItem('uc_dark', darkMode); } catch {}
  }, [darkMode]);

  // ── Persist favorites ──
  useEffect(() => {
    try { localStorage.setItem("uc_favs", JSON.stringify(favorites)); } catch {}
  }, [favorites]);

  // ── Add to history on each valid conversion ──
  useEffect(() => {
    if (!result || result === "—" || !st.input) return;
    setHistory(h => {
      const entry = { catId: st.catId, catLabel: cat.label, catIcon: cat.icon, fromId: st.fromId, toId: st.toId, fromSymbol: from.symbol, toSymbol: to.symbol, input: st.input, result, ts: Date.now() };
      const filtered = h.filter(e => !(e.fromId === entry.fromId && e.toId === entry.toId && e.catId === entry.catId));
      return [entry, ...filtered].slice(0, 15);
    });
  }, [st.catId, st.fromId, st.toId, result]);

  // ── Keyboard shortcuts ──
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT" || e.target.tagName === "TEXTAREA") return;
      if (e.key === "s" || e.key === "S") { e.preventDefault(); swapUnits(); }
      if (e.key === "f" || e.key === "F") { e.preventDefault(); inputRef.current?.focus(); }
      if (e.key === "Escape") { setSidebarOpen(false); setShowHistory(false); setShowFavs(false); }
      if (e.key === "c" || e.key === "C") { if (result && result !== "—") copyResult(); }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [result]);

  // ── Copy result ──
  const copyResult = useCallback(() => {
    if (!result || result === "—") return;
    try {
      navigator.clipboard.writeText(`${result} ${to.symbol}`);
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch {}
  }, [result, to]);

  // ── Favorites helpers ──
  const favKey = `${st.catId}|${st.fromId}|${st.toId}`;
  const isFav = favorites.some(f => f.key === favKey);
  const toggleFav = () => {
    if (isFav) {
      setFavorites(f => f.filter(x => x.key !== favKey));
    } else {
      setFavorites(f => [...f, { key: favKey, catId: st.catId, catLabel: cat.label, catIcon: cat.icon, fromId: st.fromId, toId: st.toId, fromSymbol: from.symbol, toSymbol: to.symbol }]);
    }
  };

  // ── Share URL ──
  const shareUrl = () => {
    try {
      const url = window.location.href !== "about:srcdoc" ? window.location.href : `${window.location.origin}${window.location.pathname}#c=${st.catId}&f=${st.fromId}&t=${st.toId}&v=${encodeURIComponent(st.input)}`;
      navigator.clipboard.writeText(url);
      setCopied("url");
      setTimeout(() => setCopied(false), 2000);
    } catch {}
  };

  // ── Inline result edit ──
  const startEdit = () => {
    if (!result || result === "—") return;
    setEditingResult(true);
    setEditVal(result.replace(/\s/g, ""));
    setTimeout(() => resultRef.current?.select(), 30);
  };
  const commitEdit = () => {
    const n = parseFloat(editVal);
    if (!isNaN(n)) {
      const base = cat.toBase[to.id](n);
      const back = cat.fromBase[from.id](base);
      setSt(s => ({ ...s, input: formatNumber(back) }));
    }
    setEditingResult(false);
  };

  return (
    <div style={{fontFamily:"'DM Mono','Courier New',monospace",background:"var(--bg)",minHeight:"100vh",color:"var(--text)",display:"flex",flexDirection:"column"}}>
      <style>{`


        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:var(--bg)}
        ::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
        .catbtn{transition:all .13s;cursor:pointer;border:none;text-align:left;width:100%;background:transparent}
        .catbtn:hover{background:var(--active)!important;color:var(--accent)!important}
        .unitsel{transition:border-color .13s;cursor:pointer}
        .unitsel:focus,.inputval:focus{outline:2px solid var(--accent);outline-offset:1px}
        .swapbtn{transition:all .22s;cursor:pointer}
        .swapbtn:hover{background:var(--accent)!important;color:var(--bg)!important;transform:rotate(180deg)}
        .rcard{cursor:pointer;transition:border-color .12s,background .12s}
        .rcard:hover{border-color:var(--accent)!important;background:var(--surface3)!important}
        @keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
        .fa{animation:fu .16s ease}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
        @media(max-width:520px){.g2{grid-template-columns:1fr}}
        .mmb{display:none!important}
        @media(max-width:860px){
          .sidebar{position:fixed!important;left:0;top:0;height:100vh;z-index:100;transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1)}
          .sidebar.open{transform:translateX(0)!important}
          .mmb{display:flex!important}
          .mna{margin-left:0!important}
        }
        /* Tablet: hide share button */
        @media(max-width:600px){
          .hd-share{display:none!important}
        }
        /* Mobile: hide logo text to maximise search width */
        @media(max-width:420px){
          .hd-logo{display:none!important}
          .mna{padding:12px 10px!important}
        }
        /* Touch: bigger tap targets in result cards */
        @media(max-width:860px){
          .rcard{padding:12px 14px!important}
        }
        select option{background:var(--opt-bg);color:var(--text)}
        .sritem:hover{background:var(--active)!important}
        input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
        input[type=number]{-moz-appearance:textfield}

        @keyframes flash{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}

        .hitem:hover{background:var(--active)!important;cursor:pointer}
        .colbtn{transition:all .15s;cursor:pointer;border:none;padding:4px 10px;border-radius:3px;font-family:inherit;font-size:10px}
        .colbtn.active{background:var(--accent)!important;color:#fff!important}

        @media(max-width:420px){.panel{width:100vw}}
        .result-input{background:transparent!important;border:none!important;outline:2px solid var(--accent)!important;color:var(--text)!important;font-family:inherit;font-size:21px;font-weight:500;width:100%;padding:0;min-width:0}
        .g1{grid-template-columns:1fr!important}

        @media(max-width:520px){.g3{grid-template-columns:1fr 1fr!important}}
        .kbd{display:inline-block;background:var(--surface2);border:1px solid var(--border2);border-radius:3px;padding:0 5px;font-size:9px;color:var(--muted);margin-left:4px;vertical-align:middle}

        @keyframes tip-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
      `}</style>

      {/* HEADER */}
      <header style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"0 10px",height:52,display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,zIndex:50,minWidth:0}}>

        {/* Hamburger — mobile only */}
        <button className="mmb" onClick={()=>setSidebarOpen(v=>!v)}

          <span style={{color:"var(--accent)"}}>UNIT</span><span style={{color:"var(--text)"}}>CONV</span>
        </span>

        {/* GLOBAL SEARCH — always visible, fills all available space */}
        <div style={{position:"relative",flex:1,minWidth:0}}>

            onBlur={()=>setTimeout(()=>setSearchFocused(false),200)}
            placeholder="Hledat jednotku..."
            style={{width:"100%",background:"var(--surface2)",border:searchFocused?"1px solid var(--accent)":"1px solid var(--border2)",color:"var(--text)",fontFamily:"inherit",fontSize:15,padding:"9px 34px 9px 32px",borderRadius:4,outline:"none",transition:"border-color .15s",WebkitAppearance:"none",boxSizing:"border-box"}}
          />

            <button onClick={()=>setGlobalSearch("")}
              style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--faint)",cursor:"pointer",fontSize:20,lineHeight:1,padding:"4px 6px"}}>

          {searchFocused && globalSearch.length === 1 && (
            <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"var(--surface,#0b0b17)",backgroundColor:"var(--surface,#0b0b17)",border:"1px solid var(--border2,#222238)",borderRadius:6,zIndex:300,padding:"12px 14px",fontSize:12,color:"var(--faint,#484860)",boxShadow:"0 8px 32px rgba(0,0,0,.5)"}}>

            &#11088;

            style={{background:showHistory?"var(--accent)":"var(--surface2)",border:"1px solid var(--border2)",color:showHistory?"#fff":"var(--text)",width:36,height:36,borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,transition:"all .2s",flexShrink:0}}>
            &#128336;

            style={{background:copied==="url"?"var(--accent)":"var(--surface2)",border:"1px solid var(--border2)",color:copied==="url"?"#fff":"var(--text)",width:36,height:36,borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,transition:"all .2s",flexShrink:0}}>
            {copied==="url"?"✓":"🔗"}

            style={{background:"var(--surface2)",border:"1px solid var(--border2)",color:"var(--text)",width:36,height:36,borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,transition:"all .2s",flexShrink:0}}>
            {darkMode ? "☀️" : "🌙"}
          </button>
        </div>
      </header>


      {/* ── HISTORY PANEL ── */}
      {showHistory && (
        <div className="panel slide-in">
          <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:12,fontWeight:500,color:"var(--text)"}}>🕐 Historie převodů</span>
            <button onClick={()=>setShowHistory(false)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
          </div>
          {history.length === 0 ? (
            <div style={{padding:16,fontSize:12,color:"var(--dim)"}}>Zatím žádné převody.</div>
          ) : history.map((h,i) => (
            <div key={i} className="hitem" onClick={()=>{
              const c = CATEGORIES.find(x=>x.id===h.catId);
              if(c) { setSt({catId:h.catId,fromId:h.fromId,toId:h.toId,input:h.input}); setShowHistory(false); }
            }} style={{padding:"9px 16px",borderBottom:"1px solid var(--border)",display:"flex",flexDirection:"column",gap:2}}>
              <div style={{fontSize:9,color:"var(--dim)",letterSpacing:"0.1em",textTransform:"uppercase"}}>{h.catIcon} {h.catLabel}</div>
              <div style={{fontSize:12,color:"var(--text)"}}><span style={{color:"var(--accent)"}}>{h.input} {h.fromSymbol}</span> = <span style={{fontWeight:500}}>{h.result} {h.toSymbol}</span></div>
            </div>
          ))}
          {history.length > 0 && <div style={{padding:"8px 16px"}}><button onClick={()=>setHistory([])} style={{background:"none",border:"1px solid var(--border2)",color:"var(--dim)",cursor:"pointer",borderRadius:3,padding:"4px 10px",fontSize:10,fontFamily:"inherit",width:"100%"}}>Vymazat historii</button></div>}
        </div>
      )}

      {/* ── FAVORITES PANEL ── */}
      {showFavs && (
        <div className="panel slide-in">
          <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:12,fontWeight:500,color:"var(--text)"}}>⭐ Oblíbené</span>
            <button onClick={()=>setShowFavs(false)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
          </div>
          {favorites.length === 0 ? (
            <div style={{padding:16,fontSize:12,color:"var(--dim)"}}>Žádné oblíbené. Klikni na ⭐ u převodníku.</div>
          ) : favorites.map((fav,i) => (
            <div key={i} className="hitem" onClick={()=>{
              setSt({catId:fav.catId,fromId:fav.fromId,toId:fav.toId,input:"1"});
              setShowFavs(false);
            }} style={{padding:"9px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:9,color:"var(--dim)",textTransform:"uppercase",letterSpacing:"0.1em"}}>{fav.catIcon} {fav.catLabel}</div>
                <div style={{fontSize:12,color:"var(--text)"}}>{fav.fromSymbol} → {fav.toSymbol}</div>
              </div>
              <button onClick={e=>{e.stopPropagation();setFavorites(f=>f.filter((_,j)=>j!==i));}}
                style={{background:"none",border:"none",color:"var(--dim)",cursor:"pointer",fontSize:16,flexShrink:0}}>×</button>
            </div>
          ))}
        </div>
      )}

      <div style={{display:"flex",flex:1}}>
        {sidebarOpen && <div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:99}}/>}

        {/* SIDEBAR */}
        <aside className={`sidebar${sidebarOpen?" open":""}`}
          style={{width:225,background:"var(--surface)",borderRight:"1px solid #1a1a2e",flexShrink:0,overflowY:"auto",paddingBottom:20}}>
          <div style={{padding:"10px 14px 6px",fontSize:9,color:"var(--dim)",letterSpacing:"0.14em",textTransform:"uppercase"}}>Kategorie</div>
          {grouped.map(({group,cats})=>(
            <div key={group}>
              <div style={{padding:"7px 14px 3px",fontSize:9,color:"var(--group)",letterSpacing:"0.16em",textTransform:"uppercase",borderTop:"1px solid #1a1a2e",marginTop:4}}>{group}</div>
              {cats.map(cat=>(
                <button key={cat.id} className="catbtn" onClick={()=>switchCat(cat)}
                  style={{padding:"7px 14px",background:st.catId===cat.id?"var(--active)":"transparent",color:st.catId===cat.id?"var(--accent)":"var(--muted)",borderLeft:st.catId===cat.id?"2px solid #e8521a":"2px solid transparent",fontFamily:"inherit",fontSize:12,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:13}}>{cat.icon}</span>{cat.label}
                </button>
              ))}
            </div>
          ))}
        </aside>

        {/* MAIN */}
        <main key={st.catId} className="mna" style={{flex:1,padding:"20px 16px",maxWidth:860,overflowX:"hidden"}}>
          <div style={{marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:24}}>{cat.icon}</span>
            <div>
              <h1 style={{fontFamily:"'Unbounded',sans-serif",fontWeight:700,fontSize:18,letterSpacing:"-0.5px"}}>{cat.label}</h1>
              <p style={{color:"var(--dim)",fontSize:10,marginTop:1}}>{cat.units.length} jednotek</p>
            </div>
          </div>

          {/* CONVERTER */}
          <div style={{background:"var(--surface)",border:"1px solid #1a1a2e",borderRadius:8,padding:18,marginBottom:18}}>
            <label style={{fontSize:9,color:"var(--dim)",letterSpacing:"0.15em",textTransform:"uppercase",display:"block",marginBottom:4}}>Z jednotky</label>
            <div style={{display:"flex",gap:7,marginBottom:12}}>
              <select className="unitsel" value={from.id}
                onChange={e=>setSt(s=>({...s,fromId:e.target.value}))}
                style={{background:"var(--surface2)",border:"1px solid #222238",color:"var(--text)",fontFamily:"inherit",fontSize:12,padding:"8px 9px",borderRadius:4,flex:"0 0 185px",cursor:"pointer"}}>
                {cat.units.map(u=><option key={u.id} value={u.id}>{u.label} ({u.symbol})</option>)}
              </select>
              <input className="inputval" type="number" inputMode="decimal" value={st.input} onChange={e=>setSt(s=>({...s,input:e.target.value}))}
                style={{flex:1,background:"var(--surface2)",border:"1px solid #222238",color:"var(--accent)",fontFamily:"inherit",fontSize:21,fontWeight:500,padding:"8px 13px",borderRadius:4,minWidth:0,outline:"none"}} placeholder="0"/>
            </div>

            <div style={{display:"flex",alignItems:"center",marginBottom:12}}>
              <div style={{flex:1,height:1,background:"var(--border)"}}/>
              <button className="swapbtn" onClick={swapUnits}
                style={{background:"var(--swap-bg)",border:"1px solid #222238",color:"var(--text)",width:32,height:32,borderRadius:"50%",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 11px"}}>⇅</button>
              <div style={{flex:1,height:1,background:"var(--border)"}}/>
            </div>

            <label style={{fontSize:9,color:"var(--dim)",letterSpacing:"0.15em",textTransform:"uppercase",display:"block",marginBottom:4}}>Na jednotku</label>
            <div style={{display:"flex",gap:7,marginBottom:12}}>
              <select className="unitsel" value={to.id}
                onChange={e=>setSt(s=>({...s,toId:e.target.value}))}
                style={{background:"var(--surface2)",border:"1px solid #222238",color:"var(--text)",fontFamily:"inherit",fontSize:12,padding:"8px 9px",borderRadius:4,flex:"0 0 185px",cursor:"pointer"}}>
                {cat.units.map(u=><option key={u.id} value={u.id}>{u.label} ({u.symbol})</option>)}
              </select>
              <div className="fa" key={result}
                style={{flex:1,background:"var(--surface3)",border:"1px solid #222238",color:result&&result!=="—"?"var(--text)":"var(--ghost)",fontSize:21,fontWeight:500,padding:"8px 13px",borderRadius:4,display:"flex",alignItems:"center",minWidth:0,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
                {result||"—"}
              </div>
            </div>

            {result&&result!=="—"&&!isNaN(parseFloat(st.input))&&(
              <div style={{padding:"7px 11px",background:"var(--surface2)",borderRadius:4,border:"1px solid #1a1a2e",fontSize:11,color:"var(--faint)"}}>
                <span style={{color:"var(--accent)"}}>{st.input} {from.symbol}</span>{" = "}
                <span style={{color:"var(--text)"}}>{result} {to.symbol}</span>
              </div>
            )}
          </div>

          {/* KEYBOARD HINTS — hidden on touch devices via CSS */}
          <div className="kbd-bar" style={{fontSize:9,color:"var(--dim)",marginBottom:16,display:"flex",gap:12,flexWrap:"wrap"}}>
            <span><kbd className="kbd">S</kbd> swap</span>
            <span><kbd className="kbd">F</kbd> focus input</span>
            <span><kbd className="kbd">C</kbd> kopírovat</span>
            <span><kbd className="kbd">Esc</kbd> zavřít panel</span>
            <span style={{color:"var(--dim)",marginLeft:"auto",cursor:"pointer"}} onClick={startEdit} title="Klikni na výsledek pro zpětný převod">← klikni na výsledek pro zpětný převod</span>
          </div>

          {/* ALL */}
          {st.input&&!isNaN(parseFloat(st.input))&&(
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{fontSize:9,color:"var(--dim)",letterSpacing:"0.15em",textTransform:"uppercase"}}>
                  Všechny převody z {from.symbol}
                </div>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filtrovat..."
                  style={{background:"var(--surface2)",border:"1px solid #1a1a2e",color:"var(--text)",fontFamily:"inherit",fontSize:11,padding:"4px 9px",borderRadius:4,width:120,outline:"none"}}/>
              </div>
              <div className={`g2${columns===1?" g1":columns===3?" g3":""}`}>
                {filteredUnits.filter(u=>u.id!==from.id).map(u=>{
                  const val = doConvert(st.input, from, u, cat);
                  const active = u.id===st.toId;
                  const tip = TOOLTIPS[u.id];
                  return (
                    <div key={u.id} className="rcard" onClick={()=>{setSt(s=>({...s,toId:u.id}));setActiveTip(null);}}
                      style={{position:"relative",background:active?"var(--active)":"var(--surface)",border:`1px solid ${active?"var(--accent)":"var(--border)"}`,borderRadius:4,padding:"9px 13px"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
                        <div style={{fontSize:9,color:"var(--dim)",letterSpacing:"0.09em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.label}</div>
                        {tip && <button className="tip-btn" onClick={e=>{e.stopPropagation();setActiveTip(activeTip===u.id?null:u.id);}} title="Zajímavost">ℹ</button>}
                      </div>
                      <div style={{fontSize:13,color:"var(--text)",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {val} <span style={{color:"var(--accent)",fontSize:10}}>{u.symbol}</span>
                      </div>
                      {activeTip===u.id && tip && (
                        <div className="tip-bubble" style={{top:"calc(100% + 6px)",left:0,right:0,maxWidth:"100%",pointerEvents:"auto"}}>
                          <span style={{color:"var(--accent)",fontWeight:600,marginRight:4}}>ℹ</span>{tip}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </main>
      </div>

      {/* FOOTER */}
      <footer style={{borderTop:"1px solid var(--border)",background:"var(--surface)",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <span style={{fontSize:10,color:"var(--dim)",letterSpacing:"0.06em"}}>
          &copy; Martin Slanec &middot; 63 kategorií &middot; 560 jednotek
        </span>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <a href="mailto:mslanec@gmail.com"
            style={{fontSize:11,color:"var(--muted)",textDecoration:"none",display:"flex",alignItems:"center",gap:5,transition:"color .15s"}}
            onMouseEnter={e=>e.currentTarget.style.color="var(--accent)"}
            onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>
            &#9993; mslanec@gmail.com
          </a>
          <a href="https://www.linkedin.com/in/martinslanec" target="_blank" rel="noopener noreferrer"
            style={{fontSize:11,color:"var(--muted)",textDecoration:"none",display:"flex",alignItems:"center",gap:5,transition:"color .15s"}}
            onMouseEnter={e=>e.currentTarget.style.color="var(--accent)"}
            onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            LinkedIn
          </a>
        </div>
      </footer>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(UnitConverter));
  </script>
</body>
</html>
