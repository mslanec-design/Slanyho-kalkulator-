<style>
:root{
  --pink:    #f472b6;
  --pink-l:  #fbcfe8;
  --teal:    #2dd4bf;
  --teal-l:  #99f6e4;
  --baby-pk: #fce7f3;
  --baby-bl: #bfdbfe;
  --bg:      #100818;
  --bg2:     #1e0d2a;
  --bg3:     #2a1040;
  --border:  #3d1f56;
  --text:    #f0e6ff;
  --muted:   #9d7bb8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
input[type=number]::-webkit-inner-spin-button{opacity:1}
input[type=date]{color-scheme:dark}

/* bg decoration */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 40% at 20% 10%, rgba(244,114,182,.12) 0%, transparent 60%),
  radial-gradient(ellipse 50% 40% at 80% 80%, rgba(45,212,191,.1) 0%, transparent 60%);
  pointer-events:none;z-index:0}

#header{position:relative;z-index:1;background:linear-gradient(135deg,rgba(30,13,42,.95),rgba(42,16,64,.95));
  border-bottom:1px solid var(--border);padding:14px 16px;
  padding-top:max(14px,env(safe-area-inset-top));
  display:flex;align-items:center;gap:10px}
#header-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
  background:linear-gradient(135deg,var(--pink),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#header-sub{font-size:11px;color:var(--muted);font-weight:300;letter-spacing:.5px}

#content{position:relative;z-index:1;padding:14px 12px 90px;max-width:800px;margin:0 auto}

#nav{position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:rgba(30,13,42,.97);border-top:1px solid var(--border);
  display:flex;padding-bottom:max(10px,env(safe-area-inset-bottom));
  backdrop-filter:blur(12px)}
.nav-btn{flex:1;background:transparent;border:none;cursor:pointer;
  padding:8px 4px 4px;display:flex;flex-direction:column;align-items:center;
  gap:2px;font-size:11px;font-weight:600;color:var(--muted);
  border-top:2px solid transparent;font-family:'DM Sans',sans-serif}
.nav-btn.active{color:var(--pink);border-top-color:var(--pink)}
.nav-icon{font-size:20px}

.view{display:none}.view.active{display:block}

/* ── FIGURE + CARDS LAYOUT ── */
.top-section{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-bottom:16px;align-items:start}
.cards-left,.cards-right{display:flex;flex-direction:column;gap:8px}
.figure-center{display:flex;flex-direction:column;align-items:center;gap:4px}

/* card */
.card{background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);border-radius:14px;padding:10px 11px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(244,114,182,.1),rgba(45,212,191,.1));transition:opacity .2s}
.card:active::before,.card.selected::before{opacity:1}
.card.selected{border-color:var(--pink)}
.card-label{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:3px}
.card-val{font-size:18px;font-weight:700;line-height:1;font-family:'Playfair Display',serif}
.card-unit{font-size:9px;color:var(--muted);margin-top:2px}
.card-sub{font-size:9px;margin-top:2px;font-weight:600}
.card-diff{font-size:9px;margin-top:1px}

/* chart box */
.chart-box{background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);border-radius:16px;padding:16px 12px 12px;margin-bottom:12px}
.chart-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;
  color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chart-wrap{position:relative;width:100%;height:220px}

/* info */
.info-btn{background:transparent;border:1px solid var(--border);border-radius:50%;
  width:18px;height:18px;font-size:10px;color:var(--muted);cursor:pointer;
  flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
.info-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:12px;font-size:12px;line-height:1.6;color:var(--muted);display:none}
.info-box.show{display:block}
.info-box strong{color:var(--text)}

/* legend */
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:8px 0 0;font-size:10px}

/* progress */
.progress-wrap{padding:10px 4px 4px}
.progress-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px}
.progress-bar{height:5px;border-radius:4px;background:var(--bg3);overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(to right,var(--pink),var(--teal));border-radius:4px}
.progress-text{text-align:center;font-size:11px;color:var(--muted);margin-top:4px}

/* form */
.form-box{background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);border-radius:16px;padding:18px}
.form-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;
  background:linear-gradient(135deg,var(--pink),var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
@media(max-width:380px){.form-grid{grid-template-columns:1fr}}
label{display:block;font-size:10px;color:var(--muted);font-weight:600;
  margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;
  padding:11px 12px;color:var(--text);font-size:15px;outline:none;font-family:'DM Sans',sans-serif}
input:focus{border-color:var(--pink)}
.save-btn{margin-top:20px;width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--pink),#e879f9);color:#fff;
  font-weight:700;font-size:16px;cursor:pointer;font-family:'DM Sans',sans-serif;
  box-shadow:0 4px 20px rgba(244,114,182,.3)}
.save-btn.ok{background:linear-gradient(135deg,#34d399,#10b981)}

/* table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:520px;font-size:12px}
thead tr{background:var(--bg3)}
th{padding:9px 10px;text-align:left;color:var(--muted);font-weight:600;
  font-size:10px;text-transform:uppercase;white-space:nowrap}
tbody tr:nth-child(even){background:rgba(42,16,64,.5)}
tbody tr:nth-child(odd){background:rgba(30,13,42,.5)}
td{padding:8px 10px;white-space:nowrap;color:var(--text)}
.btn-sm{background:transparent;border:1px solid var(--border);border-radius:6px;
  padding:2px 7px;cursor:pointer;font-size:12px}

/* dot on figure */
.fig-dot{position:absolute;width:8px;height:8px;border-radius:50%;
  background:var(--pink);border:2px solid var(--bg);
  box-shadow:0 0 6px rgba(244,114,182,.8)}
.fig-dot.active{background:var(--teal);box-shadow:0 0 8px rgba(45,212,191,.9)}

@keyframes pulse-glow{0%,100%{opacity:.7}50%{opacity:1}}
.fig-highlight{animation:pulse-glow 2s ease-in-out infinite}
</style>
</head>
<body>

<div id="header">
  <div>
    <div id="header-title">Body Tracker</div>
    <div id="header-sub">měření postavy</div>
  </div>
</div>

<div id="content">

  <!-- GRAFY -->
  <div id="view-grafy" class="view active">
    <div class="top-section" id="top-section"></div>
    <div id="chart-area"></div>
  </div>

  <!-- ZADANI -->
  <div id="view-zadani" class="view">
    <div class="form-box">
      <div class="form-title">Zadat měření</div>
      <label>Datum</label>
      <input type="date" id="f-date"/>
      <div class="form-grid">
        <div><label>🦵 Lýtko (cm)</label><input type="number" step="0.5" id="f-lytko" placeholder="35.0"/></div>
        <div><label>🦵 Stehno (cm)</label><input type="number" step="0.5" id="f-stehno" placeholder="55.0"/></div>
        <div><label>🍑 Boky (cm)</label><input type="number" step="0.5" id="f-boky" placeholder="95.0"/></div>
        <div><label>⌛ Pas (cm)</label><input type="number" step="0.5" id="f-pas" placeholder="70.0"/></div>
        <div><label>🫁 Pod prsama (cm)</label><input type="number" step="0.5" id="f-podprsa" placeholder="75.0"/></div>
        <div><label>💪 Biceps (cm)</label><input type="number" step="0.5" id="f-biceps" placeholder="28.0"/></div>
        <div><label>🍑 Zadek (cm)</label><input type="number" step="0.5" id="f-zadek" placeholder="100.0"/></div>
        <div><label>👙 Prsa (cm)</label><input type="number" step="0.5" id="f-prsa" placeholder="95.0"/></div>
      </div>
      <button class="save-btn" id="save-btn" onclick="saveRecord()">Uložit měření ✨</button>
    </div>
  </div>

  <!-- TABULKA -->
  <div id="view-tabulka" class="view">
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Datum</th><th>Lýtko</th><th>Stehno</th><th>Boky</th>
          <th>Pas</th><th>Pod prsama</th><th>Biceps</th><th></th>
        </tr></thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>

</div>

<nav id="nav">
  <button class="nav-btn active" onclick="showView('grafy',this)"><span class="nav-icon">📊</span>Grafy</button>
  <button class="nav-btn" onclick="showView('zadani',this)"><span class="nav-icon">✏️</span>Zadat</button>
  <button class="nav-btn" onclick="showView('tabulka',this)"><span class="nav-icon">📋</span>Tabulka</button>
</nav>

function sorted(){return[...records].sort((a,b)=>a.date.localeCompare(b.date));}
function latest(){const s=sorted();return s[s.length-1];}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit'});}

function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');btn.classList.add('active');
  if(name==='tabulka')renderTable();
  if(name==='grafy')renderAll();
  if(name==='zadani'&&!document.getElementById('f-date').value)
    document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
}

/* ── TOP SECTION (cards + figure) ── */
function renderTop(){
  const lat=latest();
  const s=sorted();
  const prev=s.length>1?s[s.length-2]:null;

  const left=METRICS.slice(0,4);
  const right=METRICS.slice(4,8);

  function cardHtml(m){
    const v=lat?lat[m.key]:null;
    const pv=prev?prev[m.key]:null;
    const diff=v!=null&&pv!=null?(v-pv).toFixed(1):null;
    const sel=activeCard===m.key;
    const diffColor=diff==null?'':parseFloat(diff)<0?'#34d399':parseFloat(diff)>0?'#f87171':m.color;
    const diffTxt=diff==null?'':parseFloat(diff)<0?'▼ '+Math.abs(diff):parseFloat(diff)>0?'▲ '+diff:'= '+diff;
    return `<div class="card${sel?' selected':''}" style="border-color:${sel?m.color:'#3d1f56'}" onclick="selectCard('${m.key}')">
      <div class="card-label">${m.emoji} ${m.label}</div>
      <div class="card-val" style="color:${m.color}">${v!=null?v+'':' –'}</div>
      <div class="card-unit">cm</div>
      ${diff!=null?`<div class="card-diff" style="color:${diffColor}">${diffTxt} cm</div>`:''}
    </div>`;
  }

  document.getElementById('top-section').innerHTML=`
    <div class="cards-left">${left.map(cardHtml).join('')}</div>
    <div class="figure-center">${figureSvg()}</div>
    <div class="cards-right">${right.map(cardHtml).join('')}</div>
  `;
}

/* ── CHART HELPERS ── */
function mkCanvas(id){return `<div class="chart-wrap"><canvas id="${id}"></canvas></div>`;}
function infoBox(id,html){
  return `<button class="info-btn" onclick="toggleInfo('${id}')">ℹ</button>
<div class="info-box" id="info-${id}">${html}</div>`;
}
function toggleInfo(id){document.getElementById('info-'+id).classList.toggle('show');}
function killCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch{}});charts={};}
function ctx(id){return document.getElementById(id).getContext('2d');}

function zoneDataset(labels,yVal,color,fillTarget){
  return{data:labels.map(()=>yVal),borderColor:color,borderWidth:1.5,borderDash:[5,4],
    backgroundColor:color,fill:fillTarget!==undefined?fillTarget:false,
    pointRadius:0,pointHoverRadius:0,tension:0,spanGaps:true,order:0};
}

const BASE={
  responsive:true,maintainAspectRatio:false,
  interaction:{mode:'index',intersect:false},
  plugins:{
    legend:{display:false},
    tooltip:{backgroundColor:'#1e0d2a',borderColor:'#3d1f56',borderWidth:1,
             titleColor:'#9d7bb8',bodyColor:'#f0e6ff',padding:10,
             filter:item=>item.dataset.pointRadius!==0}
  },
  scales:{
    x:{grid:{color:'rgba(61,31,86,.6)'},ticks:{color:'#9d7bb8',font:{size:11}}},
    y:{grid:{color:'rgba(61,31,86,.6)'},ticks:{color:'#9d7bb8',font:{size:11}}}
  },
  elements:{point:{radius:5,hoverRadius:7},line:{tension:0.4}}
};

/* ── RENDER CHART ── */
function renderChart(){
  killCharts();
  const s=sorted();
  const labels=s.map(r=>fmtDate(r.date));
  const m=METRICS.find(x=>x.key===activeCard);
  if(!m)return;

  const vals=s.map(r=>r[m.key]);
  const allV=vals.filter(Boolean);
  const yMin=allV.length?Math.min(...allV)-5:0;
  const yMax=allV.length?Math.max(...allV)+5:100;

  // trend line data
  const first=s[0]?s[0][m.key]:null;
  const last=latest()?latest()[m.key]:null;
  const diffTotal=first&&last?(last-first).toFixed(1):null;
  const diffColor=diffTotal==null?m.color:parseFloat(diffTotal)<0?'#34d399':parseFloat(diffTotal)>0?'#f87171':m.color;

  const infoTexts={
    boky:     '<strong>Boky a hýždě</strong> — měř v nejširším místě přes hýždě. Tato hodnota odráží objem spodní části postavy. Změny jsou vidět postupně, obvykle 1–3 cm za měsíc při pravidelném tréninku. Větší boky mohou znamenat nárůst svalů hýžďového svalstva (glutes) — to je žádoucí!',
    pas:      '<strong>Pas</strong> — měř na nejužším místě trupu, cca 2–3 cm nad pupkem, ráno nalačno. Pro ženy: <strong>pod 80 cm</strong> = nízké riziko, 80–88 cm = zvýšené riziko, nad 88 cm = vysoké kardiovaskulární riziko. Pas je nejlepší ukazatel viscerálního tuku.',
    stehno:   '<strong>Stehno</strong> — měř na nejsilnějším místě, přibližně 10–15 cm pod rozkrokem. Změny odráží jak ztrátu tuku tak nárůst svalů. Větší rozdíl mezi stehnem a lýtkem = atletičtější postava.',
    podprsa:  '<strong>Pod prsama</strong> — měř těsně pod prsní linií, obvod hrudníku. Tato hodnota se mění s hmotností a tréninkem zad. Důležitá pro výběr velikosti podprsenky (spodní číslo).',
    lytko:    '<strong>Lýtko</strong> — měř na nejsilnějším místě. Lýtka jsou geneticky podmíněná a mění se pomaleji než ostatní partie. Symetrie lýtek je dobrý ukazatel vyváženého tréninku.',
    zadek:    '<strong>Zadek</strong> — měř v nejširším místě přes hýždě. Zpravidla se kryje s největším obvodem boků. Změny odrážejí objem hýžďového svalstva (glutes). Při silovém tréninku může obvod narůstat i při hubnutí — což je žádoucí.',
    prsa:     '<strong>Prsa</strong> — měř v nejširší části, vodorovně přes bradavky, při normálním nádechu. Důležité pro sledování změn v oblasti hrudníku. Při hubnutí obvykle klesá, při silovém tréninku zad může narůstat.',
    biceps:   '<strong>Biceps</strong> — měř v nejvyšším bodě při mírné flexi paže. Nárůst obvodu paže odráží sílu a svalový rozvoj horní části těla. Symetrie obou paží je důležitá — měř obě a sleduj případné rozdíly.',
  };

  document.getElementById('chart-area').innerHTML=`<div class="chart-box">
    <div class="chart-title">${m.emoji} ${m.label}
      <span style="color:#9d7bb8;font-size:11px;font-weight:400;font-family:'DM Sans',sans-serif">(cm)</span>
      ${diffTotal!=null?`<span style="font-size:11px;color:${diffColor};font-family:'DM Sans',sans-serif;font-weight:500">
        ${parseFloat(diffTotal)<0?'▼':'▲'} ${Math.abs(diffTotal)} cm celkem</span>`:''}
      ${infoBox(m.key, infoTexts[m.key]||'')}
    </div>
    ${mkCanvas('cm')}
    ${allV.length>=2?`<div class="progress-wrap">
      <div class="progress-labels">
        <span>Start: ${first} cm</span>
        <span style="color:${m.color};font-weight:600">Nyní: ${last} cm</span>
      </div>
    </div>`:''}
  </div>`;

  charts.m=new Chart(ctx('cm'),{
    type:'line',
    data:{labels, datasets:[{
      data:vals, label:m.label, order:1,
      borderColor:m.color,
      backgroundColor: m.color+'22',
      fill:true, borderWidth:2.5,
      pointBackgroundColor:m.color,
      pointBorderColor:'#1e0d2a',
      pointBorderWidth:2,
      pointRadius:5, pointHoverRadius:8,
      spanGaps:true, tension:0.4
    }]},
    options:{...BASE,
      scales:{...BASE.scales, y:{...BASE.scales.y, min:yMin, max:yMax}},
      plugins:{...BASE.plugins, tooltip:{...BASE.plugins.tooltip,
        filter:()=>true,
        callbacks:{label:item=>`${m.label}: ${item.raw} cm`}
      }}
    }
  });
}

function renderAll(){renderTop();renderChart();}

/* ── TABLE ── */
function renderTable(){
  const s=[...sorted()].reverse();
  document.getElementById('tbl-body').innerHTML=s.map(r=>{
    return `<tr>
      <td>${r.date}</td>
      <td style="color:#67e8f9">${r.lytko??'–'}</td>
      <td style="color:#fb7185">${r.stehno??'–'}</td>
      <td style="color:#f472b6">${r.boky??'–'}</td>
      <td style="color:#2dd4bf">${r.pas??'–'}</td>
      <td style="color:#a78bfa">${r.podprsa??'–'}</td>
      <td style="color:#fbbf24">${r.biceps??'–'}</td>
      <td style="color:#f43f5e">${r.zadek??'–'}</td>
      <td style="color:#e879f9">${r.prsa??'–'}</td>
      <td>
        <button class="btn-sm" style="color:#9d7bb8;margin-right:3px" onclick="editRow('${r.date}')">✏️</button>
        <button class="btn-sm" style="color:#f472b6" onclick="deleteRow('${r.date}')">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

function editRow(date){
  const r=records.find(x=>x.date===date);if(!r)return;
  fillForm(r);
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{b.classList.remove('active');if(i===1)b.classList.add('active');});
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-zadani').classList.add('active');
}
function deleteRow(date){
  if(!confirm('Smazat '+date+'?'))return;
  records=records.filter(r=>r.date!==date);sd(records);renderTable();renderAll();
}

/* ── FORM ── */
function fillForm(r){
  ['date','lytko','stehno','boky','pas','podprsa','biceps','zadek','prsa'].forEach(k=>{
    const el=document.getElementById('f-'+k);if(el)el.value=r[k]??'';
  });
}
document.getElementById('f-date').addEventListener('change',function(){
  const r=records.find(x=>x.date===this.value);
  if(r)fillForm(r);
  else{['lytko','stehno','boky','pas','podprsa','biceps'].forEach(k=>{document.getElementById('f-'+k).value='';});}
});
function saveRecord(){
  const date=document.getElementById('f-date').value;
  if(!date){alert('Vyber datum');return;}
  const n=id=>{const v=document.getElementById(id).value;return v!==''?parseFloat(v):null;};
  const entry={date,lytko:n('f-lytko'),stehno:n('f-stehno'),boky:n('f-boky'),
               pas:n('f-pas'),podprsa:n('f-podprsa'),biceps:n('f-biceps'),
               zadek:n('f-zadek'),prsa:n('f-prsa')};
  records=records.filter(r=>r.date!==date).concat(entry);
  sd(records);
  const btn=document.getElementById('save-btn');
  btn.textContent='✓ Uloženo! ✨';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='Uložit měření ✨';btn.classList.remove('ok');},2000);
  renderAll();
}

document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
renderAll();
</script>
<script>
if('serviceWorker' in navigator){
  const sw = `
    const C='body-tracker-v1';
    self.addEventListener('install',e=>e.waitUntil(
      caches.open(C).then(c=>c.addAll(['./body-tracker.html']))
    ));
    self.addEventListener('fetch',e=>e.respondWith(
      caches.match(e.request).then(r=>r||fetch(e.request))
    ));
  `;
  const blob = new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>
